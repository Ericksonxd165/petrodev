<!doctype html>
<html lang="en">
  <head>

    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <link rel="stylesheet" href="./assets/style.css">
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Petrodev Inicia Sesion</title>
  </head>
  <body >
      <!-- HOla un comentario -->
  <div class="form-container">

<!-- aca -->
      <form id="login" class="form">
        <img src="./assets/media/thelogo.png" class="logo" alt="">

          <p class="subtitle"><b>PETRODEV - </b>Iniciar Sesión</p>
          <div class="field">
            <i class="fa-solid fa-user iconb"></i>
            <input autocomplete="off" placeholder="Usuario" class="input-field" type="text">
          </div>
          <div class="field">
            <i class="fa-solid fa-lock iconb"></i>
            <input placeholder="Password" class="input-field" type="Contraseña">
          </div>
          <div class="btn">
          <button class="button1">&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;Iniciar Sesion&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;</button>
        
          </div>
          <button class="button3">Olvide Mi contraseña</button>

          <p class="label" id="buttonl">No tienes cuenta? registrate</p>
      </form>

      <form id="register" class="form invisible">


        <!-- aca -->
        <img src="./assets/media/thelogo.png" class="logo" alt="">

          <p class="subtitle"><b>PETRODEV - </b>Registrate</p>
        <div class="field">
          <i class="fa-solid fa-user iconb"></i>
          <input autocomplete="off" placeholder="Usuario" class="input-field" type="text">
        </div>
        <div class="field">
          <i class="fa-solid fa-envelope iconb"></i>
          <input autocomplete="off" placeholder="Correo electronico" class="input-field" type="text">
        </div>
        <div class="field">
          <i class="fa-solid fa-unlock-keyhole iconb"></i>
          <input placeholder="Contraseña" class="input-field" type="Contraseña">
        </div>
        <div class="field">
          <i class="fa-solid fa-lock iconb"></i>
          <input placeholder="Confirmar contraseña" class="input-field" type="Contraseña">
        </div>
        <div class="btn">
        <button class="button2">Registrate</button>
        </div>
        <p class="label" id="buttonl" >Tienes cuenta? Inicia sesion</p>
    </form>

  </div>

    <script type="module" src="/main.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@6.6.0/js/all.min.js"></script>
  </body>
</html>
